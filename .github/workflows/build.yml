name: Build Tripletail Overlay

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:texus/raylib
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libraylib6-dev \
            libopusfile-dev \
            libcurl4-openssl-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            pkg-config

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tripletail-overlay-linux
          path: tripletail-overlay

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install raylib opusfile curl pkg-config

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tripletail-overlay-macos
          path: tripletail-overlay

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-opusfile
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-raylib

      - name: Build
        shell: msys2 {0}
        run: |
          ./build.bat

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tripletail-overlay-windows
          path: tripletail-overlay.exe

